# Per-function config. submit-job is called from the browser with the anon
# key (a valid JWT). stripe-webhook is called by Stripe, which authenticates
# via signature — JWT verification must be off for it.

[functions.submit-job]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false

# notify-employer is called from the signed-in admin UI. verify_jwt gets us a
# valid JWT; the handler additionally resolves it to a real user, so the anon
# key alone is rejected.
[functions.notify-employer]
verify_jwt = true

# jobs-feed is a public RSS/JSON feed (newsletter syndication). It reads with
# the ANON key, so the board's RLS policy is still the single visibility
# mechanism.
[functions.jobs-feed]
verify_jwt = false
